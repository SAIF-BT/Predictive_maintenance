name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'    # every Monday at 6am UTC automatically
  workflow_dispatch:         # also lets you trigger manually from GitHub UI

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    env:                                              
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/SAIF-BT/Predictive_maintenance.mlflow
      MLFLOW_TRACKING_USERNAME: SAIF-BT
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip dependencies             
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pathspec==0.11.2" \
            "dvc==3.50.0" \
            "dvc-s3==3.2.0" \
            "aiobotocore==2.13.3" \
            "boto3==1.34.131" \
            "botocore==1.34.131" \
            "xgboost==2.0.3" \
            "pandas==2.0.3" \
            "scikit-learn==1.4.2" \
            "mlflow==2.14.1" \
            "kaggle==1.6.17" \
            "dagshub==0.3.37" \
            "pyyaml==6.0.1" \
            "matplotlib==3.7.5" \
            "scipy==1.11.4" \
            "streamlit==1.35.0" \
            "plotly==5.22.0"

      - name: Configure DVC remote
        run: |
          dvc remote add -d origin \
            https://dagshub.com/SAIF-BT/Predictive_maintenance.dvc --force
          dvc remote modify origin auth basic
          dvc remote modify origin user SAIF-BT
          dvc remote modify origin password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Restore DVC cache
        run: dvc pull -r origin || true

      - name: Run full pipeline
        run: dvc repro

      - name: Commit updated dvc.lock
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add dvc.lock
          git diff --staged --quiet || git commit -m "ci: update dvc.lock after repro"
          git push || true

      - name: Push artifacts
        run: dvc push -r origin

      - name: Push artifacts                    
        run: dvc push -r origin

      - name: Report metrics                  
        run: |
          echo "### Model Metrics" >> $GITHUB_STEP_SUMMARY
          cat metrics.json >> $GITHUB_STEP_SUMMARY
          dvc metrics show
