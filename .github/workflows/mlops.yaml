name: Full-MLOps-Pipeline
 
on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'src/**'
      - 'params.yaml'
      - '.github/workflows/mlops.yaml'
 
jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
 
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-s3 xgboost pandas scikit-learn matplotlib \
                      plotly pyyaml kaggle mlflow scipy dagshub
 
      - name: Configure DVC Remote
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote add origin https://dagshub.com/SAIF-BT/Predictive_maintenance.dvc || true
          dvc remote modify origin auth basic
          dvc remote modify origin user SAIF-BT
          dvc remote modify origin password $DAGSHUB_TOKEN
 
      - name: Pull Data from DagsHub
        run: |
          dvc pull -r origin
 
      - name: Run Full DVC Pipeline
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc repro
 
      - name: Push Model & Artifacts to DagsHub
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc push -r origin
 
      - name: Commit Updated DVC Lock & Metrics
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add dvc.lock metrics.json || true
          git commit -m "🚀 Automated Model Update [skip ci]" || echo "Nothing to commit"
          git push origin main