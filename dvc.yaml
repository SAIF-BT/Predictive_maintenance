stages:
  ingest:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    outs:
    - data/raw/
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/raw/
    - src/preprocess.py
    outs:
    - data/processed/train_FD001_processed.csv
  features:
    cmd: python src/features.py
    deps:
    - data/processed/train_FD001_processed.csv
    - src/features.py
    outs:
    - data/processed/train_FD001_features.csv
  train:
    cmd: python src/train.py
    deps:
    - data/processed/train_FD001_features.csv
    - src/train.py
    outs:
    - models/model_xgb.json
    metrics:
    - metrics.json:
        cache: false
    params:
    - train
  visualize:
    cmd: python src/visualization.py
    deps:
    - models/model_xgb.json
    - src/visualization.py
    outs:
    - plots/engine_81_prediction.png
