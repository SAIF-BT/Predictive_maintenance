stages:
  ingest:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    outs:
    - data/raw/

  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/raw/CMaps/train_FD002.txt
    - src/preprocess.py
    outs:
    - data/processed/train_FD002_processed.csv
    - models/scalers.pkl          # ← added
    params:
    - data.dataset

  features:
    cmd: python src/features.py
    deps:
    - data/processed/train_FD002_processed.csv
    - src/features.py
    outs:
    - data/processed/train_FD002_features.csv
    params:
    - data.dataset

  train:
    cmd: python src/train.py
    deps:
    - data/processed/train_FD002_features.csv
    - src/train.py
    outs:
    - models/model_xgb.json
    metrics:
    - metrics.json:
        cache: false
    params:
    - data.dataset
    - train

  visualize:
    cmd: python src/visualization.py
    deps:
    - models/model_xgb.json
    - src/visualization.py
    outs:
    - plots/engine_prediction.png
    - plots/feature_importance.png
